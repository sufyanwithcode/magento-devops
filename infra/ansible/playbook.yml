- name: Deploy Magento DevOps stack
  hosts: magento
  become: true
  vars:
    repo_url: "https://github.com/sufyanwithcode/magento-devops.git"
    project_dir: /opt/magento-devops

  tasks:
    - name: Install prerequisites
      apt:
        name: [ca-certificates, curl, git, gnupg]
        update_cache: true
        state: present

    - name: Create keyring dir
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        keyring: /etc/apt/keyrings/docker.gpg
        state: present

    - name: Add Docker apt repository
      apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker Engine + Compose plugin
      apt:
        name: [docker-ce, docker-ce-cli, containerd.io, docker-compose-plugin]
        update_cache: true
        state: present

    - name: Clone / update project repository
      git:
        repo: "{{ repo_url }}"
        dest: "{{ project_dir }}"
        version: main
        force: true

    - name: Ensure .env exists
      copy:
        src: "{{ project_dir }}/.env.example"
        dest: "{{ project_dir }}/.env"
        remote_src: true
        force: false

    - name: Build and start the stack
      command: docker compose up -d --build
      args:
        chdir: "{{ project_dir }}"
