# GitLab CI alternative — copy to repo root as .gitlab-ci.yml to use.
stages:
  - validate
  - build
  - deploy

validate:
  stage: validate
  image: docker:27
  services: [docker:27-dind]
  script:
    - cp .env.example .env
    - docker compose config

build:
  stage: build
  image: docker:27
  services: [docker:27-dind]
  script:
    - docker compose build

deploy:
  stage: deploy
  image: alpine:3.20
  only: [main]
  script:
    - apk add --no-cache openssh-client
    - ssh -o StrictHostKeyChecking=no "$DEPLOY_USER@$DEPLOY_HOST"
        "cd /opt/magento-devops && git pull origin main && docker compose up -d --build"
